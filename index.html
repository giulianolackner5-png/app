<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conquête & Pillage - Monde</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
        }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: #2d3748 !important;
            color: #fff !important;
        }
    </style>
</head>
<body class="flex flex-col h-screen text-white overflow-hidden">

    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center z-[1000] shadow-md">
        <div class="flex items-center space-x-6">
            <h1 class="text-xl font-black tracking-wider text-red-500">WARZONE</h1>
            <div id="hud-user-info" class="hidden flex items-center space-x-4">
                <span class="text-sm text-gray-400">Joueur: <strong id="hud-username" class="text-white">-</strong></span>
                <span class="text-sm text-gray-400">Or: <strong id="hud-gold" class="text-yellow-400">0 🪙</strong></span>
            </div>
        </div>
        <div>
            <button id="auth-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition duration-200 text-sm">
                Connexion Google
            </button>
        </div>
    </header>

    <div id="map" class="w-full flex-grow"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        // Liens d'importation corrigés au format CDN v10 pour éviter l'écran noir
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"; 
        import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"; 
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; 

        // Ta configuration d'origine conservée telle quelle
        const firebaseConfig = { databaseURL: "https://firebasedatabase.app" }; 
        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app); 
        const auth = getAuth(app); 
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        let map;
        let markersGroup = {};

        // Initialisation de la carte Leaflet (Style Sombre)
        function initMap() {
            map = L.map('map', { doubleClickZoom: false }).setView([20, 0], 2);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
                maxZoom: 19
            }).addTo(map);

            map.on('dblclick', function(e) {
                if (!currentUser) {
                    alert("Vous devez être connecté pour fonder une base !");
                    return;
                }
                foundBase(e.latlng.lat, e.latlng.lng);
            });
        }

        const authBtn = document.getElementById('auth-btn');
        const hudUserInfo = document.getElementById('hud-user-info');
        const hudUsername = document.getElementById('hud-username');
        const hudGold = document.getElementById('hud-gold');

        authBtn.addEventListener('click', () => {
            if (!currentUser) {
                signInWithPopup(auth, googleProvider).catch((error) => {
                    console.error("Erreur d'authentification:", error);
                });
            } else {
                auth.signOut().then(() => {
                    currentUser = null;
                    hudUserInfo.classList.add('hidden');
                    authBtn.innerText = "Connexion Google";
                });
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                authBtn.innerText = "Déconnexion";
                hudUserInfo.classList.remove('hidden');
                
                const playerRef = ref(db, 'players/' + user.uid);
                onValue(playerRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        hudUsername.innerText = data.name || user.displayName;
                        hudGold.innerText = (data.gold || 0) + " 🪙";
                    } else {
                        set(playerRef, {
                            name: user.displayName,
                            gold: 100
                        });
                    }
                });
            } else {
                currentUser = null;
                hudUserInfo.classList.add('hidden');
                authBtn.innerText = "Connexion Google";
            }
        });

        function foundBase(lat, lng) {
            const baseRef = ref(db, 'bases/' + currentUser.uid);
            get(baseRef).then((snapshot) => {
                if (snapshot.exists()) {
                    alert("Vous possédez déjà une base ! Elle va être déplacée.");
                }
                set(baseRef, {
                    ownerId: currentUser.uid,
                    ownerName: currentUser.displayName,
                    lat: lat,
                    lng: lng,
                    hp: 100,
                    lootableGold: 50
                });
            });
        }

        window.pillardAction = function(targetOwnerId) {
            if (!currentUser) return;
            if (currentUser.uid === targetOwnerId) {
                alert("Vous ne pouvez pas piller votre propre base !");
                return;
            }

            const targetBaseRef = ref(db, 'bases/' + targetOwnerId);
            const attackerRef = ref(db, 'players/' + currentUser.uid);

            get(targetBaseRef).then((snapshot) => {
                const base = snapshot.val();
                if (!base || base.hp <= 0) {
                    alert("Cette base est déjà détruite !");
                    return;
                }

                const stolenGold = Math.min(base.lootableGold, 20);
                const newHp = Math.max(0, base.hp - 25);
                const newLootable = Math.max(0, base.lootableGold - stolenGold);

                set(targetBaseRef, {
                    ...base,
                    hp: newHp,
                    lootableGold: newLootable
                });

                get(attackerRef).then((attSnapshot) => {
                    const attData = attSnapshot.val();
                    if (attData) {
                        set(attackerRef, {
                            ...attData,
                            gold: (attData.gold || 0) + stolenGold
                        });
                    }
                });

                alert(`Pillage réussi ! +${stolenGold} 🪙 et -25 PV.`);
            });
        };

        function syncBases() {
            const basesRef = ref(db, 'bases');
            onValue(basesRef, (snapshot) => {
                const data = snapshot.val();
                
                for (let id in markersGroup) {
                    if (!data || !data[id]) {
                        map.removeLayer(markersGroup[id]);
                        delete markersGroup[id];
                    }
                }

                if (!data) return;

                Object.keys(data).forEach((key) => {
                    const base = data[key];
                    const isOwnBase = currentUser && currentUser.uid === base.ownerId;
                    
                    let markerColor = "red";
                    if (isOwnBase) markerColor = "blue";
                    if (base.hp <= 0) markerColor = "black";

                    const customIcon = L.divIcon({
                        className: 'custom-div-icon',
                        html: `<div style="background-color:${markerColor}; width:12px; height:12px; border-radius:50%; border:2px solid white;"></div>`,
                        iconSize: [12, 12]
                    });

                    const popupContent = `
                        <div class="text-sm">
                            <strong class="block text-base text-red-400">${base.ownerName}</strong>
                            <div class="my-1">PV: <span class="font-bold">${base.hp}/100</span></div>
                            <div class="my-1">Butin: <span class="text-yellow-400 font-bold">${base.lootableGold} 🪙</span></div>
                            ${(!isOwnBase && base.hp > 0) ? `
                                <button onclick="window.pillardAction('${base.ownerId}')" class="mt-2 w-full bg-yellow-600 hover:bg-yellow-700 text-white text-xs font-bold py-1 px-2 rounded transition">
                                    ⚔️ Piller la base
                                </button>
                            ` : ''}
                            ${isOwnBase ? `<span class="text-xs text-blue-400 font-semibold block mt-1">Votre base</span>` : ''}
                            ${base.hp <= 0 ? `<span class="text-xs text-gray-400 font-semibold block mt-1">Détruite</span>` : ''}
                        </div>
                    `;

                    if (markersGroup[key]) {
                        markersGroup[key].setLatLng([base.lat, base.lng]);
                        markersGroup[key].setIcon(customIcon);
                        markersGroup[key].setPopupContent(popupContent);
                    } else {
                        const marker = L.marker([base.lat, base.lng], { icon: customIcon }).addTo(map);
                        marker.bindPopup(popupContent);
                        markersGroup[key] = marker;
                    }
                });
            });
        }

        initMap();
        syncBases();
    </script>
</body>
</html>
