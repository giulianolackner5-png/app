<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARZONE - Tactique & Conquête</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
        }
        /* Style de la grille tactique rétro-futuriste */
        .tactical-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(51, 65, 85, 0.15) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(51, 65, 85, 0.15) 1px, transparent 1px);
        }
    </style>
</head>
<body class="flex flex-col h-screen text-white overflow-hidden font-sans select-none">

    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center z-50 shadow-xl">
        <div class="flex items-center space-x-6">
            <h1 class="text-2xl font-black tracking-wider text-red-500">WARZONE</h1>
            <div id="hud-user-info" class="hidden flex items-center space-x-6 bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700">
                <div class="flex items-center space-x-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                    <span class="text-sm text-slate-300"><strong id="hud-username" class="text-white font-semibold">-</strong></span>
                </div>
                <span class="text-sm font-bold text-yellow-400">🪙 <span id="hud-gold">0</span></span>
            </div>
        </div>
        
        <div class="flex items-center space-x-4">
            <div class="bg-slate-800 px-3 py-1.5 rounded-lg text-xs text-slate-400 border border-slate-700">
                En ligne: <span id="online-count" class="text-green-400 font-bold">0</span>
            </div>
            <button id="auth-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-5 rounded-lg transition duration-200 text-sm shadow-md">
                Connexion Google
            </button>
        </div>
    </header>

    <main class="flex-grow relative w-full overflow-auto tactical-grid bg-slate-950 flex items-center justify-center">
        
        <div id="world-map" class="relative w-[1920px] h-[1080px] bg-slate-900/40 border-2 border-slate-800 rounded-xl overflow-hidden cursor-crosshair">
            <svg class="absolute inset-0 w-full h-full opacity-10 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
                <path d="M150,200 Q300,100 500,250 T900,200 T1100,500 T700,800 T300,700 Z" fill="#64748b"/>
                <path d="M1200,150 Q1400,80 1700,200 T1800,600 T1400,700 T1100,400 Z" fill="#64748b"/>
                <path d="M400,750 Q600,650 800,800 T900,1050 T500,1000 Z" fill="#64748b"/>
            </svg>

            <div id="bases-layer" class="absolute inset-0"></div>
        </div>

        <div id="custom-popup" class="hidden absolute bg-slate-900 border border-slate-700 p-4 rounded-xl shadow-2xl z-50 w-64 text-sm">
            <div class="flex justify-between items-start mb-2">
                <strong id="pop-owner" class="text-base text-red-400 font-bold">-</strong>
                <button onclick="closePopup()" class="text-slate-500 hover:text-white font-bold text-xs">✕</button>
            </div>
            <div class="w-full bg-slate-800 h-2 rounded-full mb-3 overflow-hidden">
                <div id="pop-hp-bar" class="bg-green-500 h-full transition-all duration-300" style="width: 100%"></div>
            </div>
            <div class="text-xs text-slate-300 mb-1">Structure : <span id="pop-hp" class="font-bold text-white">100/100</span></div>
            <div class="text-xs text-slate-300 mb-3">Butin : <span id="pop-gold" class="text-yellow-400 font-bold">0 🪙</span></div>
            <div id="pop-action-container"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"; 
        import { getDatabase, ref, set, onValue, get, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"; 
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"; 

        const firebaseConfig = { 
            databaseURL: "https://mon-jeu-conquete-default-rtdb.firebaseio.com" 
        }; 

        const app = initializeApp(firebaseConfig); 
        const db = getDatabase(app); 
        const auth = getAuth(app); 
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        const worldMap = document.getElementById('world-map');
        const basesLayer = document.getElementById('bases-layer');
        const customPopup = document.getElementById('custom-popup');

        // Fonder une base au double-clic sur l'écran fictif
        worldMap.addEventListener('dblclick', (e) => {
            if (!currentUser) {
                alert("Connectez-vous d'abord !");
                return;
            }
            // Récupérer les coordonnées exactes relatives à la carte de 1920x1080
            const rect = worldMap.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const baseRef = ref(db, 'bases/' + currentUser.uid);
            set(baseRef, {
                ownerId: currentUser.uid,
                ownerName: currentUser.displayName,
                posX: x,
                posY: y,
                hp: 100,
                lootableGold: 50
            });
        });

        // Gestion de l'authentification et de la barre HUD
        const authBtn = document.getElementById('auth-btn');
        const hudUserInfo = document.getElementById('hud-user-info');
        const hudUsername = document.getElementById('hud-username');
        const hudGold = document.getElementById('hud-gold');

        authBtn.addEventListener('click', () => {
            if (!currentUser) {
                signInWithPopup(auth, googleProvider).catch((err) => console.error(err));
            } else {
                auth.signOut().then(() => location.reload());
            }
        });

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUser = user;
                authBtn.innerText = "Déconnexion";
                hudUserInfo.classList.remove('hidden');
                
                const onlineRef = ref(db, 'presence/' + user.uid);
                set(onlineRef, { name: user.displayName, status: "online" });
                onDisconnect(onlineRef).remove();

                onValue(ref(db, 'players/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        hudUsername.innerText = data.name;
                        hudGold.innerText = data.gold;
                    } else {
                        set(ref(db, 'players/' + user.uid), { name: user.displayName, gold: 100 });
                    }
                });
            }
        });

        // Compteur présence
        onValue(ref(db, 'presence'), (snapshot) => {
            document.getElementById('online-count').innerText = snapshot.val() ? Object.keys(snapshot.val()).length : 0;
        });

        // Ouvrir les infos d'une base
        window.openBaseDetails = function(id, name, hp, gold, x, y) {
            document.getElementById('pop-owner').innerText = name;
            document.getElementById('pop-hp').innerText = `${hp}/100`;
            document.getElementById('pop-hp-bar').style.width = `${hp}%`;
            document.getElementById('pop-gold').innerText = `${gold} 🪙`;

            const btnContainer = document.getElementById('pop-action-container');
            const isOwn = currentUser && currentUser.uid === id;

            if (!isOwn && hp > 0) {
                btnContainer.innerHTML = `<button onclick="window.pillardAction('${id}')" class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2 rounded transition uppercase tracking-wider text-xs">⚔️ Piller la base</button>`;
            } else if (isOwn) {
                btnContainer.innerHTML = `<span class="text-xs text-blue-400 block text-center font-medium">Votre Quartier Général</span>`;
            } else {
                btnContainer.innerHTML = `<span class="text-xs text-slate-500 block text-center font-medium">Ruines fumantes</span>`;
            }

            // Positionner la popup à côté du clic
            customPopup.style.left = `${x + 20}px`;
            customPopup.style.top = `${y - 40}px`;
            customPopup.classList.remove('hidden');
        };

        window.closePopup = function() {
            customPopup.classList.add('hidden');
        };

        // Action de combat
        window.pillardAction = function(targetId) {
            if (!currentUser) return;
            get(ref(db, 'bases/' + targetId)).then((snap) => {
                const base = snap.val();
                if (!base || base.hp <= 0) return;

                const stolen = Math.min(base.lootableGold, 20);
                set(ref(db, 'bases/' + targetId), {
                    ...base,
                    hp: Math.max(0, base.hp - 25),
                    lootableGold: Math.max(0, base.lootableGold - stolen)
                });

                const attRef = ref(db, 'players/' + currentUser.uid);
                get(attRef).then((pSnap) => {
                    if(pSnap.exists()) {
                        set(attRef, { ...pSnap.val(), gold: pSnap.val().gold + stolen });
                    }
                });
                closePopup();
            });
        };

        // Synchronisation en temps réel de l'affichage sur la carte fictive
        onValue(ref(db, 'bases'), (snapshot) => {
            basesLayer.innerHTML = "";
            const data = snapshot.val();
            if (!data) return;

            Object.keys(data).forEach((key) => {
                const base = data[key];
                const isOwn = currentUser && currentUser.uid === base.ownerId;
                
                let color = isOwn ? 'bg-blue-500 shadow-blue-500/80' : 'bg-red-500 shadow-red-500/80';
                if (base.hp <= 0) color = 'bg-slate-600 shadow-transparent';

                // Génération d'un marqueur HTML absolu sur la carte
                const marker = document.createElement('div');
                marker.className = `absolute ${color} w-4 h-4 rounded-full border-2 border-white cursor-pointer shadow-lg transition-transform hover:scale-125`;
                marker.style.left = `${base.posX}px`;
                marker.style.top = `${base.posY}px`;
                marker.style.transform = 'translate(-50%, -50%)';

                marker.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.openBaseDetails(base.ownerId, base.ownerName, base.hp, base.lootableGold, base.posX, base.posY);
                });

                basesLayer.appendChild(marker);
            });
        });
    </script>
</body>
</html>
